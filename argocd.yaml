apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: linguasphere-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/khanhlinh-create/linguasphere-k8s.git
    targetRevision: main
    path: manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: linguasphere
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

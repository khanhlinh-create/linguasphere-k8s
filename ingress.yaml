apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: linguasphere-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: linguasphere.local
      http:
        paths:
          # Frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80

          # Backend (API)
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 80